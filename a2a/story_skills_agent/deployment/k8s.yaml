apiVersion: v1
kind: ServiceAccount
metadata:
  name: story-skills-agent
  namespace: team1
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: story-skills-agent
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
  name: story-skills-agent
  namespace: team1
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8000
  selector:
    app.kubernetes.io/name: story-skills-agent
    kagenti.io/type: agent
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: agent
    app.kubernetes.io/name: story-skills-agent
    kagenti.io/framework: GoogleADK
    kagenti.io/type: agent
    kagenti.io/workload-type: deployment
    protocol.kagenti.io/a2a: ""
  name: story-skills-agent
  namespace: team1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: story-skills-agent
      kagenti.io/type: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: story-skills-agent
        kagenti.io/framework: GoogleADK
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
    spec:
      containers:
      - name: agent
        image: story-skills-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: AGENT_ENDPOINT
          value: http://story-skills-agent.team1.svc.cluster.local:8080/
        - name: LLM_API_BASE
          value: https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com/v1
        - name: LLM_API_KEY
          value: not-needed
        - name: OPENAI_API_KEY
          value: not-needed
        - name: LLM_MODEL
          value: openai/gemini/models/gemini-2.5-flash
        - name: OCP_MCP_URL
          value: https://kubernetes-mcp-server-ocp-mcp-server.apps.ocp.v7hjl.sandbox2288.opentlc.com/sse
        - name: UV_CACHE_DIR
          value: /app/.cache/uv
        readinessProbe:
          failureThreshold: 12
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 8000
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsUser: 1001
        volumeMounts:
        - mountPath: /app/.cache
          name: cache
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: story-skills-agent
      volumes:
      - emptyDir: {}
        name: cache
